name: "Agent — Stage 3: Software Architect"

# Triggers when 02_design/00_design-notes.md is newly added to the feature branch
# (i.e. when the UI/UX Designer's PR is merged).
# Invokes Jules as the Architect; Jules reads the PO spec + approved mockups,
# writes 03_arch-design.md, and opens a PR back into the feature branch.
# When that PR is merged, 03_arch-design.md lands on the branch and
# automatically triggers Stage 4 (Software Engineer).

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'features/*/02_design/00_design-notes.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-arch-agent:
    name: Run Software Architect Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BASE="${{ github.ref_name }}"
          REST="${BASE#feature/}"
          FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "base_branch=$BASE"          >> $GITHUB_OUTPUT

          # Guard: only fire when design notes were newly created, not revised.
          if [ "${{ github.event_name }}" = "push" ]; then
            ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
              | grep -E 'features/[^/]+/02_design/00_design-notes\.md' | head -1 || true)
            if [ -z "$ADDED" ]; then
              echo "⏭️  Design notes were revised, not newly created — skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Invoke Jules — Software Architect
        if: steps.meta.outputs.skip != 'true'
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ steps.meta.outputs.base_branch }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `.github/agents/software-architect.md` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully before proceeding.
          HEREDOC

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Input files (all on this branch):
            \`${FEATURE_DIR}/01_po-spec.md\`            — approved product spec
            \`${FEATURE_DIR}/02_design/\`               — UI/UX mockups and design notes
              Read \`${FEATURE_DIR}/02_design/00_design-notes.md\` for the screen inventory
              and list of new components the engineer will need to build.

          Output: \`${FEATURE_DIR}/03_arch-design.md\` — produce this file per your instructions

          Your architecture must account for any new screens and components identified in the
          design notes. Ensure your affected-files list covers both backend and frontend work.

          Only create or modify \`${FEATURE_DIR}/03_arch-design.md\`.
          Do not touch any other file in the repository.

          IMPORTANT: this is a documentation-only task.
          Do NOT run pnpm install, do NOT run type checks, do NOT run tests, do NOT run linting.
          Just read the input files and write the output file.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh
