name: "Agent — Stage 1: Product Owner"

# Triggers when a new 00_request.md is pushed to a feature/* branch.
# Calls Gemini as the PO agent, commits 01_po-spec.md, opens a PR back into the feature branch.
# All agent PRs target the feature branch. Only one final PR goes to main at the very end.

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - "features/*/00_request.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  run-po-agent:
    name: Run Product Owner Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🏗️ Setup Monorepo
        uses: ./.github/actions/setup-monorepo
        with:
          node_version: "22"

      - name: 🔍 Identify changed feature
        id: meta
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '00_request.md' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No 00_request.md found in diff — skipping."
            exit 0
          fi
          FEATURE_DIR=$(dirname "$CHANGED")
          DIRNAME=$(basename "$FEATURE_DIR")
          FEATURE_ID=$(echo "$DIRNAME" | cut -d'_' -f1)
          FEATURE_SLUG=$(echo "$DIRNAME" | cut -d'_' -f2-)
          BRANCH="po/${FEATURE_ID}-${FEATURE_SLUG}"
          OUTPUT_FILE="${FEATURE_DIR}/01_po-spec.md"
          FEATURE_BRANCH="${{ github.ref_name }}"
          echo "feature_dir=$FEATURE_DIR"       >> $GITHUB_OUTPUT
          echo "feature_id=$FEATURE_ID"         >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG"     >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"                 >> $GITHUB_OUTPUT
          echo "output_file=$OUTPUT_FILE"       >> $GITHUB_OUTPUT
          echo "feature_branch=$FEATURE_BRANCH" >> $GITHUB_OUTPUT

      - name: 🤖 Run Product Owner agent
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          AGENT_ROLE_FILE: .github/agents/product-owner.md
          INPUT_FILES:     ${{ steps.meta.outputs.feature_dir }}/00_request.md
          OUTPUT_FILE:     ${{ steps.meta.outputs.output_file }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
        run: node .github/scripts/run-agent.mjs

      - name: 📬 Commit and open PR
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          BRANCH:          ${{ steps.meta.outputs.branch }}
          OUTPUT_FILE:     ${{ steps.meta.outputs.output_file }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
          FEATURE_BRANCH:  ${{ steps.meta.outputs.feature_branch }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "$OUTPUT_FILE"
          git commit -m "feat(po): add spec for ${FEATURE_ID}_${FEATURE_SLUG}"
          git push origin "$BRANCH"

          TITLE="[PO] Spec: ${FEATURE_SLUG//-/ } (#${FEATURE_ID})"
          BODY="## Product Owner Spec

Feature: \`${FEATURE_DIR}\`

The Product Owner agent has written a spec based on your feature request.

**Review the spec.** If anything is unclear or incomplete:
- Post a review comment → the agent will revise and push a new commit automatically
- Or push your own edits directly to this branch

Merge when satisfied — the Architect agent triggers automatically.

### Files
- \`${OUTPUT_FILE}\`"

          gh pr create \
            --title "$TITLE" \
            --body  "$BODY" \
            --base  "$FEATURE_BRANCH" \
            --head  "$BRANCH" \
            --label "stage:po-review"
