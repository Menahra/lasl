name: "Agent — Stage 1: Product Owner"

# Triggers when a new 00_request.md is pushed to a feature/* branch.
# Invokes Jules as the PO agent; Jules writes 01_po-spec.md and opens a PR
# back into the feature branch.
# When that PR is merged, 01_po-spec.md lands on the feature branch and
# automatically triggers Stage 2 (UI/UX Designer).

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'features/*/00_request.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-po-agent:
    name: Run Product Owner Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🔍 Identify changed feature
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="${{ github.ref_name }}"
            REST="${BASE#feature/}"
            FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
            FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
            FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
            FEATURE_BRANCH="$BASE"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '00_request.md' | head -1)
            if [ -z "$CHANGED" ]; then
              echo "No 00_request.md found in diff — skipping."
              exit 0
            fi
            FEATURE_DIR=$(dirname "$CHANGED")
            DIRNAME=$(basename "$FEATURE_DIR")
            FEATURE_ID=$(echo "$DIRNAME"   | cut -d'_' -f1)
            FEATURE_SLUG=$(echo "$DIRNAME" | cut -d'_' -f2-)
            FEATURE_BRANCH="${{ github.ref_name }}"
          fi
          echo "feature_id=$FEATURE_ID"         >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG"     >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"       >> $GITHUB_OUTPUT
          echo "feature_branch=$FEATURE_BRANCH" >> $GITHUB_OUTPUT

      - name: 🤖 Invoke Jules — Product Owner
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ steps.meta.outputs.feature_branch }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `.github/agents/product-owner.md` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully before proceeding.
          HEREDOC

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Input:  \`${FEATURE_DIR}/00_request.md\`  — the raw feature request
          Output: \`${FEATURE_DIR}/01_po-spec.md\`  — produce this file per your instructions

          Only create or modify \`${FEATURE_DIR}/01_po-spec.md\`.
          Do not touch any other file in the repository.

          IMPORTANT: this is a documentation-only task.
          Do NOT run pnpm install, do NOT run type checks, do NOT run tests, do NOT run linting.
          Just read the input files and write the output file.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh
