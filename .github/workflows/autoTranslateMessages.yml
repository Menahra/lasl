name: Auto-translate i18n messages

on:
  push:
    branches:
      - main
    #paths:
    #  - "apps/frontend/src/locales/en-US/messages.po"

jobs:
  translate:
    name: Translate missing messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Start LibreTranslate
        run: |
          docker run -d \
            --name libretranslate \
            -p 5000:5000 \
            libretranslate/libretranslate \
            --load-only en,de,fr \
            --disable-web-ui

      - name: Wait for LibreTranslate to be ready
        run: |
          echo "Waiting for LibreTranslate…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/languages > /dev/null; then
              echo "LibreTranslate is ready ✅"
              break
            fi
            echo "  attempt $i/30 — sleeping 10s"
            sleep 10
          done

      - name: 🏗️ Setup Monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Run auto-translate script
        working-directory: apps/frontend
        run: node scripts/auto-translate.js
        env:
          LIBRETRANSLATE_URL: http://localhost:5000/translate
          SOURCE_LOCALE: en

      - name: Build frontend dependencies
        run: pnpm --filter "frontend^..." build

      - name: Compile Lingui catalogs
        working-directory: apps/frontend
        run: pnpm compile:messages

      - name: Show changed files
        run: git -C apps/frontend status --short -- src/locales/

      - name: Create or update translation PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "i18n: auto-translate missing messages"
          branch: auto-translate/patch
          delete-branch: true
          title: "i18n: Auto-translated missing messages"
          body: |
            This PR was created automatically by the **auto-translate** workflow.

            ### What happened?
            A change to `src/locales/en/messages.po` was detected on `main`.
            Missing translations in the target locales were filled using
            [LibreTranslate](https://github.com/LibreTranslate/LibreTranslate)
            (self-hosted, no external API calls).

            ### Locales updated
            - `de-DE` (German)
            - `fr-FR` (French)

            ### What to do
            - Review the machine translations for accuracy.
            - Adjust any entries that need a human touch.
            - Merge when satisfied.

            > ⚠️ Machine translations are a starting point — always review before shipping.
          labels: |
            i18n
            automated
          # Don't open a PR if nothing actually changed
          add-paths: |
            apps/frontend/src/locales/de-DE/messages.po
            apps/frontend/src/locales/fr-FR/messages.po
            apps/frontend/src/locales/de-DE/messages.ts
            apps/frontend/src/locales/fr-FR/messages.ts
