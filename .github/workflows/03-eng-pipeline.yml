name: "Agent — Stage 3: Software Engineer"

# Triggers when the Architect PR (label: stage:arch-review) is merged.
# Calls Gemini as the Engineer, applies code changes, runs type check + Vitest, opens a PR.

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  run-eng-agent:
    name: Run Software Engineer Agent
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'stage:arch-review') &&
      startsWith(github.event.pull_request.head.ref, 'arch/')
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5

      - name: 🏗️ Setup Monorepo
        uses: ./.github/actions/setup-monorepo
        with:
          node_version: "22"

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REST="${BRANCH#arch/}"
          FEATURE_ID=$(echo "$REST" | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          NEW_BRANCH="feat/${FEATURE_ID}-${FEATURE_SLUG}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "branch=$NEW_BRANCH"         >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH"   >> $GITHUB_OUTPUT

      - name: 🤖 Run Engineer agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEATURE_DIR:    ${{ steps.meta.outputs.feature_dir }}
          FEATURE_ID:     ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:   ${{ steps.meta.outputs.feature_slug }}
          SUMMARY_FILE:   /tmp/eng-summary.md
        run: node .github/scripts/run-engineer.mjs

      - name: 🗑 Handle file deletions
        run: |
          if [ -f /tmp/files-to-delete.txt ]; then
            while IFS= read -r file; do
              if [ -f "$file" ]; then git rm "$file" && echo "Deleted: $file"; fi
            done < /tmp/files-to-delete.txt
          fi

      - name: 📦 Reinstall dependencies (in case new packages were added)
        run: pnpm install --frozen-lockfile || pnpm install

      - name: 🔷 Type check
        id: typecheck
        run: |
          pnpm check:types 2>&1 | tee /tmp/typecheck-output.txt || true
          EXIT=${PIPESTATUS[0]}
          echo "exit=$EXIT" >> $GITHUB_OUTPUT
          [ "$EXIT" -eq 0 ] && echo "status=✅ Type check passed" >> $GITHUB_OUTPUT \
                            || echo "status=❌ Type check failed" >> $GITHUB_OUTPUT

      - name: 🧪 Run Vitest tests
        id: tests
        run: |
          pnpm turbo run test 2>&1 | tee /tmp/test-output.txt || true
          EXIT=${PIPESTATUS[0]}
          echo "exit=$EXIT" >> $GITHUB_OUTPUT
          [ "$EXIT" -eq 0 ] && echo "status=✅ Tests passed" >> $GITHUB_OUTPUT \
                            || echo "status=❌ Tests failed" >> $GITHUB_OUTPUT

      - name: 🎨 Biome lint check
        id: lint
        run: |
          pnpm check:ci 2>&1 | tee /tmp/lint-output.txt || true
          EXIT=${PIPESTATUS[0]}
          echo "exit=$EXIT" >> $GITHUB_OUTPUT
          [ "$EXIT" -eq 0 ] && echo "status=✅ Biome check passed" >> $GITHUB_OUTPUT \
                            || echo "status=❌ Biome check failed (run pnpm check:fix)" >> $GITHUB_OUTPUT

      - name: 📬 Commit and open PR
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          BRANCH:            ${{ steps.meta.outputs.branch }}
          FEATURE_ID:        ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:      ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:       ${{ steps.meta.outputs.feature_dir }}
          ARCH_PR:           ${{ github.event.pull_request.number }}
          BASE_BRANCH:       ${{ steps.meta.outputs.base_branch }}
          TYPECHECK_STATUS:  ${{ steps.typecheck.outputs.status }}
          TEST_STATUS:       ${{ steps.tests.outputs.status }}
          LINT_STATUS:       ${{ steps.lint.outputs.status }}
          TYPECHECK_EXIT:    ${{ steps.typecheck.outputs.exit }}
          TEST_EXIT:         ${{ steps.tests.outputs.exit }}
          LINT_EXIT:         ${{ steps.lint.outputs.exit }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat(eng): implement ${FEATURE_ID}_${FEATURE_SLUG}"
          git push origin "$BRANCH"

          SUMMARY=$(cat /tmp/eng-summary.md 2>/dev/null || echo "(no summary)")
          TC_LOG=$(tail -20 /tmp/typecheck-output.txt 2>/dev/null)
          TEST_LOG=$(tail -40 /tmp/test-output.txt 2>/dev/null)
          LINT_LOG=$(tail -20 /tmp/lint-output.txt 2>/dev/null)

          BODY="## Implementation: ${FEATURE_SLUG//-/ }

Feature: \`${FEATURE_DIR}\`
Architecture PR: #${ARCH_PR}

${SUMMARY}

---

## CI Results
${TYPECHECK_STATUS}
${TEST_STATUS}
${LINT_STATUS}"

          ANY_FAIL=false
          [ "$TYPECHECK_EXIT" -ne 0 ] && ANY_FAIL=true
          [ "$TEST_EXIT" -ne 0 ]      && ANY_FAIL=true
          [ "$LINT_EXIT" -ne 0 ]      && ANY_FAIL=true

          if [ "$ANY_FAIL" = "true" ]; then
            BODY="${BODY}

<details>
<summary>Type check output</summary>

\`\`\`
${TC_LOG}
\`\`\`
</details>

<details>
<summary>Test output</summary>

\`\`\`
${TEST_LOG}
\`\`\`
</details>

<details>
<summary>Biome output</summary>

\`\`\`
${LINT_LOG}
\`\`\`
</details>

> ⚠️ Some checks failed. Push fixes directly to this branch or post a review comment for the agent to revise."
          fi

          TITLE="[Feat] Implement: ${FEATURE_SLUG//-/ } (#${FEATURE_ID})"
          gh pr create \
            --title "$TITLE" \
            --body  "$BODY" \
            --base  "$BASE_BRANCH" \
            --head  "$BRANCH" \
            --label "stage:eng-review"
