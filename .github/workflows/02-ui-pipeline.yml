name: "Agent — Stage 2: UI/UX Designer"

# Triggers when 01_po-spec.md is newly added to the feature branch
# (i.e. when the PO's PR is merged).
# Invokes Jules as the UI/UX Designer; Jules reads the design tokens,
# produces HTML mockups in 02_design/, screenshots them with Playwright,
# and opens a PR back into the feature branch.
# When that PR is merged, 02_design/00_design-notes.md lands on the branch
# and automatically triggers Stage 3 (Software Architect).

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'features/*/01_po-spec.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-ui-agent:
    name: Run UI/UX Designer Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BASE="${{ github.ref_name }}"
          REST="${BASE#feature/}"
          FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "base_branch=$BASE"          >> $GITHUB_OUTPUT

          # Guard: for push events, only fire when the spec was newly created (not revised).
          # Prevents re-triggering Jules when someone pushes corrections to the PO spec.
          if [ "${{ github.event_name }}" = "push" ]; then
            ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
              | grep -E 'features/[^/]+/01_po-spec\.md' | head -1 || true)
            if [ -z "$ADDED" ]; then
              echo "⏭️  01_po-spec.md was revised, not newly created — skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Invoke Jules — UI/UX Designer
        if: steps.meta.outputs.skip != 'true'
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ steps.meta.outputs.base_branch }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `.github/agents/ui-ux-designer.md` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully before proceeding.
          HEREDOC

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Input file (on this branch):
            \`${FEATURE_DIR}/01_po-spec.md\` — the approved product spec (your primary input)

          Design system files to read before starting:
            \`apps/frontend/src/styles/tokens/\` (all .css files)
            \`apps/frontend/src/styles/index.css\`
            \`apps/frontend/src/app/pages/login-page/\` (reference)
            \`apps/frontend/src/shared/components/button/\` (reference)
            \`apps/frontend/src/shared/components/input-field/\` (reference)

          Output directory: \`${FEATURE_DIR}/02_design/\`

          Follow your role instructions exactly — read the spec, determine which screens
          need designing, produce the HTML mockups, screenshot each one with Playwright,
          and write the design notes.

          Even if no UI changes are needed, you MUST still write
          \`${FEATURE_DIR}/02_design/00_design-notes.md\` explaining why.
          This file is required to advance the pipeline.

          Only create files inside \`${FEATURE_DIR}/02_design/\`.

          IMPORTANT: do NOT run pnpm install, type checks, tests, or linting.
          The only permitted commands are reading files and running a Playwright screenshot script.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh
