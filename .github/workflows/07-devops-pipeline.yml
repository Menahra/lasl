name: "Agent — Stage 7: DevOps Engineer"

# Triggers when 06_frontend-notes.md is newly added to the feature branch
# (i.e. when the Frontend Engineer's PR is merged).
# Invokes Jules as the DevOps agent; Jules writes 07_infra-notes.md and any
# docker-compose changes, then opens a PR back into the feature branch.
# When that PR is merged, 07_infra-notes.md triggers Stage 8 (QA Engineer).

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'features/*/06_frontend-notes.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-devops-agent:
    name: Run DevOps Engineer Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BASE="${{ github.ref_name }}"
          REST="${BASE#feature/}"
          FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "base_branch=$BASE"          >> $GITHUB_OUTPUT

          # Guard: only fire when frontend notes were newly created, not revised.
          if [ "${{ github.event_name }}" = "push" ]; then
            ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
              | grep -E 'features/[^/]+/06_frontend-notes\.md' | head -1 || true)
            if [ -z "$ADDED" ]; then
              echo "⏭️  Frontend notes were revised, not newly created — skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Invoke Jules — DevOps Engineer
        if: steps.meta.outputs.skip != 'true'
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ steps.meta.outputs.base_branch }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `.github/agents/devops-engineer.md` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully before proceeding.
          HEREDOC

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Input files (all on this branch):
            \`${FEATURE_DIR}/01_po-spec.md\`         — product spec
            \`${FEATURE_DIR}/03_arch-design.md\`     — architecture design (primary input)
            \`${FEATURE_DIR}/04_contracts-notes.md\` — contracts changes
            \`${FEATURE_DIR}/05_backend-notes.md\`   — backend implementation notes
            \`${FEATURE_DIR}/06_frontend-notes.md\`  — frontend implementation notes

          Output: \`${FEATURE_DIR}/07_infra-notes.md\` — produce this file per your instructions
          Also update any docker-compose files that require changes for this feature.

          Even if no infrastructure changes are needed, you MUST still write
          \`${FEATURE_DIR}/07_infra-notes.md\` explaining that.
          This file is REQUIRED — it signals the pipeline to advance to the QA stage.

          Only create or modify \`${FEATURE_DIR}/07_infra-notes.md\` and docker-compose files.
          Do not touch application source files.

          IMPORTANT: this is a documentation-only task.
          Do NOT run pnpm install, type checks, tests, or linting.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh
