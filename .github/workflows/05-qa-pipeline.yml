name: "Agent — Stage 5: QA Engineer"

# Triggers when the DevOps PR (label: stage:devops-review) is merged.
# Calls Gemini as the QA agent to write Playwright E2E tests, opens a PR.
#
# Note: E2E tests are NOT run here — they require the full Docker stack.
# The existing e2e-test.yml workflow will run them when the PR is merged to main.

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  run-qa-agent:
    name: Run QA Engineer Agent
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'stage:devops-review') &&
      startsWith(github.event.pull_request.head.ref, 'infra/')
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5

      - name: 🏗️ Setup Monorepo
        uses: ./.github/actions/setup-monorepo
        with:
          node_version: "22"

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REST="${BRANCH#infra/}"
          FEATURE_ID=$(echo "$REST" | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          NEW_BRANCH="qa/${FEATURE_ID}-${FEATURE_SLUG}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "branch=$NEW_BRANCH"         >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH"   >> $GITHUB_OUTPUT

      - name: 🤖 Run QA agent (writes Playwright .spec.ts files)
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          AGENT_ROLE_OVERRIDE:  .github/agents/qa-engineer.md
          FEATURE_DIR:          ${{ steps.meta.outputs.feature_dir }}
          FEATURE_ID:           ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:         ${{ steps.meta.outputs.feature_slug }}
          SUMMARY_FILE:         /tmp/qa-summary.md
        run: node .github/scripts/run-engineer.mjs

      - name: 🔷 Type check e2e-tests package
        id: typecheck
        run: |
          pnpm turbo run check:types --filter=@lasl/e2e-tests 2>&1 | tee /tmp/e2e-typecheck.txt || true
          EXIT=${PIPESTATUS[0]}
          echo "exit=$EXIT" >> $GITHUB_OUTPUT
          [ "$EXIT" -eq 0 ] && echo "status=✅ E2E type check passed" >> $GITHUB_OUTPUT \
                            || echo "status=⚠️ E2E type check failed — see details in PR" >> $GITHUB_OUTPUT

      - name: 📬 Commit and open PR
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          BRANCH:         ${{ steps.meta.outputs.branch }}
          FEATURE_ID:     ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:   ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:    ${{ steps.meta.outputs.feature_dir }}
          DEVOPS_PR:      ${{ github.event.pull_request.number }}
          BASE_BRANCH:    ${{ steps.meta.outputs.base_branch }}
          TC_STATUS:      ${{ steps.typecheck.outputs.status }}
          TC_EXIT:        ${{ steps.typecheck.outputs.exit }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat(qa): add e2e tests for ${FEATURE_ID}_${FEATURE_SLUG}"
          git push origin "$BRANCH"

          SUMMARY=$(cat /tmp/qa-summary.md 2>/dev/null || echo "(no summary)")
          TC_LOG=$(tail -20 /tmp/e2e-typecheck.txt 2>/dev/null)

          BODY="## E2E Tests: ${FEATURE_SLUG//-/ }

Feature: \`${FEATURE_DIR}\`
DevOps PR: #${DEVOPS_PR}

${SUMMARY}

---

## Type Check
${TC_STATUS}"

          if [ "$TC_EXIT" -ne 0 ]; then
            BODY="${BODY}

<details>
<summary>Type check output</summary>

\`\`\`
${TC_LOG}
\`\`\`
</details>"
          fi

          BODY="${BODY}

---

> 📋 **E2E tests are not run here** — they require the full Docker stack. They will be validated by the existing \`e2e-test.yml\` workflow once this PR is merged to \`main\`.

---

## ✅ Final step — merge the feature branch to main

Once you merge this PR into \`${BASE_BRANCH}\`, the full pipeline is complete.
Open one final PR: **\`${BASE_BRANCH}\` → \`main\`** to ship the feature."

          TITLE="[QA] E2E tests: ${FEATURE_SLUG//-/ } (#${FEATURE_ID})"
          gh pr create \
            --title "$TITLE" \
            --body  "$BODY" \
            --base  "$BASE_BRANCH" \
            --head  "$BRANCH" \
            --label "stage:qa-review"
