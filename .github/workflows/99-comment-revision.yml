name: "Agent — PR Revision from Review Comment"

# Triggers when you post a review comment on any Jules-created PR targeting a feature branch.
# Jules re-runs with your feedback included in the prompt, opens a fresh PR,
# and the old PR is closed automatically.
#
# Works for all stages: PO, Architect, Engineer, DevOps, QA.
# You can also push directly to the Jules branch instead — both paths work.

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  revise:
    name: Revise based on review comment
    if: >
      !endsWith(github.actor, '[bot]') &&
      github.actor != 'github-actions[bot]' &&
      startsWith(github.event.pull_request.base.ref, 'feature/')
    runs-on: ubuntu-latest

    steps:
      # Checkout the feature branch so invoke-jules.sh and agent files are available
      - name: ☁️ Checkout feature branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: 🔍 Extract feature and stage metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          REST="${BASE#feature/}"
          FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          OLD_PR="${{ github.event.pull_request.number }}"

          # Determine stage from the PR labels
          STAGE_LABEL=$(gh pr view "$OLD_PR" \
            --json labels \
            --jq '.labels[].name | select(startswith("stage:"))' \
            --repo "${{ github.repository }}" | head -1)

          if [ -z "$STAGE_LABEL" ]; then
            echo "No stage label found on PR — skipping."
            exit 0
          fi

          case "$STAGE_LABEL" in
            stage:po-review)
              AGENT_FILE=".github/agents/product-owner.md"
              CONTEXT_HINT="${FEATURE_DIR}/01_po-spec.md"
              ;;
            stage:ui-review)
              AGENT_FILE=".github/agents/ui-ux-designer.md"
              CONTEXT_HINT="the mockups and design notes in ${FEATURE_DIR}/design/"
              ;;
            stage:arch-review)
              AGENT_FILE=".github/agents/software-architect.md"
              CONTEXT_HINT="${FEATURE_DIR}/02_arch-design.md"
              ;;
            stage:eng-review)
              AGENT_FILE=".github/agents/software-engineer.md"
              CONTEXT_HINT="the implementation in PR #${OLD_PR}"
              ;;
            stage:devops-review)
              AGENT_FILE=".github/agents/devops-engineer.md"
              CONTEXT_HINT="${FEATURE_DIR}/03_infra-notes.md"
              ;;
            stage:qa-review)
              AGENT_FILE=".github/agents/qa-engineer.md"
              CONTEXT_HINT="the E2E tests in packages/e2e-tests/tests/ added in PR #${OLD_PR}"
              ;;
            *)
              echo "Unrecognised stage label '${STAGE_LABEL}' — skipping."
              exit 0
              ;;
          esac

          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "base_branch=$BASE"          >> $GITHUB_OUTPUT
          echo "old_pr=$OLD_PR"             >> $GITHUB_OUTPUT
          echo "stage_label=$STAGE_LABEL"   >> $GITHUB_OUTPUT
          echo "agent_file=$AGENT_FILE"     >> $GITHUB_OUTPUT
          echo "context_hint=$CONTEXT_HINT" >> $GITHUB_OUTPUT

      - name: 📥 Collect all reviewer comments
        id: comments
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const human = comments.data
              .filter(c => !c.user.login.endsWith('[bot]') && c.user.type !== 'Bot')
              .map(c => {
                const loc = c.path ? ` (${c.path}${c.line ? ':' + c.line : ''})` : '';
                return `- @${c.user.login}${loc}: ${c.body}`;
              })
              .join('\n');
            return human || '(no human comments found)';
          result-encoding: string

      - name: 🤖 Invoke Jules — Revision
        id: jules
        env:
          JULES_API_KEY:     ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH:   ${{ steps.meta.outputs.base_branch }}
          FEATURE_ID:        ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:      ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:       ${{ steps.meta.outputs.feature_dir }}
          AGENT_FILE:        ${{ steps.meta.outputs.agent_file }}
          CONTEXT_HINT:      ${{ steps.meta.outputs.context_hint }}
          OLD_PR:            ${{ steps.meta.outputs.old_pr }}
          REVIEWER_COMMENTS: ${{ steps.comments.outputs.result }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `AGENT_FILE_PH` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully.
          HEREDOC

          # Replace placeholder with actual value (safe: no newlines in path)
          sed -i "s|AGENT_FILE_PH|${AGENT_FILE}|g" /tmp/jules-prompt.txt

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Your previous work is in: ${CONTEXT_HINT}
          (It was submitted as PR #${OLD_PR}, which is being replaced by this revision.)

          A reviewer has requested the following changes:
          HEREDOC

          # Append comments safely (may contain special chars / newlines)
          echo "$REVIEWER_COMMENTS" >> /tmp/jules-prompt.txt

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Please revise your work to address all feedback above.
          Apply the same quality standards as in your original role instructions.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh

      - name: 🔒 Close superseded PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_PR:   ${{ steps.meta.outputs.old_pr }}
          NEW_PR:   ${{ steps.jules.outputs.pr_url }}
        run: |
          gh pr close "$OLD_PR" \
            --comment "Superseded by a revised Jules PR: ${NEW_PR}" \
            --repo "${{ github.repository }}"

      - name: 🏷️ Label Jules' revised PR
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_URL:      ${{ steps.jules.outputs.pr_url }}
          STAGE_LABEL: ${{ steps.meta.outputs.stage_label }}
        run: gh pr edit "$PR_URL" --add-label "$STAGE_LABEL"
