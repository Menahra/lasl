name: CI for API Gateway

on:
  push:
    branches: [main]
    paths:
      - "apps/api-gateway/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/actions/setup-monorepo/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/api-gateway/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/actions/setup-monorepo/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate API Gateway
    runs-on: ubuntu-latest
    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏗️ Setup
        uses: ./.github/actions/setup-monorepo

      - name: 🚀 Turbo Check (Lint, Type, Test)
        run: pnpm turbo run check:ci check:types test --filter=@lasl/api-gateway

  docker-build:
    name: Build Docker Image
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Trigger docker build
        run: |
          docker build \
            -f apps/api-gateway/Dockerfile \
            --target api-gateway \
            -t api-gateway:latest .
