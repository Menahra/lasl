name: "Agent — Stage 8: QA Engineer"

# Triggers when 07_infra-notes.md is newly added to the feature branch
# (i.e. when the DevOps Engineer's PR is merged).
# Invokes Jules as the QA agent; Jules writes Playwright E2E tests and opens
# a PR back into the feature branch.
# Once that final PR is merged, open one last PR: feature/* → main to ship.
#
# Note: E2E tests are NOT run here — they require the full Docker stack.
# The existing e2e-test.yml workflow validates them once merged to main.

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'features/*/07_infra-notes.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-qa-agent:
    name: Run QA Engineer Agent
    runs-on: ubuntu-latest

    steps:
      - name: ☁️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 🔍 Extract feature metadata
        id: meta
        run: |
          BASE="${{ github.ref_name }}"
          REST="${BASE#feature/}"
          FEATURE_ID=$(echo "$REST"   | cut -d'-' -f1)
          FEATURE_SLUG=$(echo "$REST" | cut -d'-' -f2-)
          FEATURE_DIR="features/${FEATURE_ID}_${FEATURE_SLUG}"
          echo "feature_id=$FEATURE_ID"     >> $GITHUB_OUTPUT
          echo "feature_slug=$FEATURE_SLUG" >> $GITHUB_OUTPUT
          echo "feature_dir=$FEATURE_DIR"   >> $GITHUB_OUTPUT
          echo "base_branch=$BASE"          >> $GITHUB_OUTPUT

          # Guard: only fire when infra notes were newly created, not revised.
          if [ "${{ github.event_name }}" = "push" ]; then
            ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
              | grep -E 'features/[^/]+/07_infra-notes\.md' | head -1 || true)
            if [ -z "$ADDED" ]; then
              echo "⏭️  Infra notes were revised, not newly created — skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Invoke Jules — QA Engineer
        if: steps.meta.outputs.skip != 'true'
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ steps.meta.outputs.base_branch }}
          FEATURE_ID:      ${{ steps.meta.outputs.feature_id }}
          FEATURE_SLUG:    ${{ steps.meta.outputs.feature_slug }}
          FEATURE_DIR:     ${{ steps.meta.outputs.feature_dir }}
        run: |
          cat > /tmp/jules-prompt.txt << 'HEREDOC'
          Your role and full instructions are in `.github/agents/qa-engineer.md` — read it first.
          Your project context is in `PROJECT_CONTEXT.md` — read it carefully before proceeding.
          HEREDOC

          cat >> /tmp/jules-prompt.txt << HEREDOC

          Feature ID:        ${FEATURE_ID}
          Feature slug:      ${FEATURE_SLUG}
          Feature directory: ${FEATURE_DIR}

          Input files (all on this branch):
            \`${FEATURE_DIR}/01_po-spec.md\`         — product spec and acceptance criteria (primary input)
            \`${FEATURE_DIR}/03_arch-design.md\`     — architecture design
            \`${FEATURE_DIR}/07_infra-notes.md\`     — infra notes (check for test environment changes)

          Write Playwright E2E tests in \`packages/e2e-tests/tests/\` per your role instructions.

          After writing, run \`pnpm turbo run check:types --filter=@lasl/e2e-tests\` and fix
          any TypeScript errors. Do not attempt to run the full E2E suite — it requires Docker.

          Once this PR is merged to main, the existing \`e2e-test.yml\` workflow will run them.
          HEREDOC

          export JULES_PROMPT="$(cat /tmp/jules-prompt.txt)"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          bash .github/scripts/invoke-jules.sh

      - name: 🏁 Pipeline complete
        if: steps.meta.outputs.skip != 'true'
        run: |
          echo ""
          echo "✅ All 8 pipeline stages have been invoked."
          echo "   Once Jules' QA PR is merged into the feature branch,"
          echo "   open one final PR: feature/* → main to ship the feature."
