<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Nav Authenticated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Base sizing */
      --size-unit: 0.25rem;
      --size-4: calc(var(--size-unit) * 4); /* 16px */
      --size-5: calc(var(--size-unit) * 5); /* 20px */
      --size-6: calc(var(--size-unit) * 6); /* 24px */
      --size-8: calc(var(--size-unit) * 8); /* 32px */
      --size-10: calc(var(--size-unit) * 10); /* 40px */

      --space-sm: calc(var(--size-unit) * 2); /* 8px */
      --space-md: calc(var(--size-unit) * 4); /* 16px */
      --space-lg: calc(var(--size-unit) * 6); /* 24px */

      --radius-md: 0.375rem; /* 6px */
      --radius-full: 9999px;

      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

      /* Colors */
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-700: #334155;
      --gray-900: #0f172a;

      --primary-600: #2563eb;
      --primary-50: #eff6ff;

      --color-background: var(--gray-50);
      --color-surface: #ffffff;
      --color-surface-sunken: var(--gray-100);

      --color-text-primary: var(--gray-900);
      --color-text-secondary: var(--gray-700);
      --color-text-inverse: #ffffff;

      --color-border: var(--gray-300);
      --color-border-light: var(--gray-200);
      --color-border-strong: var(--gray-400);

      /* Typography */
      --font-serif: "Crimson Text", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;

      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-background);
      color: var(--color-text-primary);
      min-width: 1440px;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .TopNav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      background-color: var(--color-surface);
      border-bottom: 1px solid var(--color-border-light);
      position: relative;
    }

    .TopNav__logo {
      font-family: var(--font-serif);
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
    }

    .TopNav__actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      position: relative;
    }

    .Avatar {
      width: var(--size-10);
      height: var(--size-10);
      border-radius: var(--radius-full);
      background-color: var(--primary-600);
      color: var(--color-text-inverse);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-sm);
      cursor: pointer;
      user-select: none;
    }

    .Popover {
      position: absolute;
      top: calc(100% + var(--space-sm));
      right: 0;
      width: 200px;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      z-index: 10;
    }

    .Popover__list {
      list-style: none;
    }

    .Popover__item {
      border-bottom: 1px solid var(--color-border-light);
    }

    .Popover__item:last-child {
      border-bottom: none;
    }

    .Popover__link {
      display: block;
      padding: var(--space-md);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      transition: background-color 0.2s, color 0.2s;
    }

    .Popover__link:hover {
      background-color: var(--color-surface-sunken);
      color: var(--color-text-primary);
    }

    /* Page Content Placeholder */
    .PageContent {
      padding: var(--space-lg);
    }

  </style>
</head>
<body>

  <header class="TopNav">
    <div class="TopNav__logo">Lughat Al-Asl</div>

    <div class="TopNav__actions">
      <!-- User Avatar / Menu Indicator -->
      <div class="Avatar" aria-label="User menu">
        AB
      </div>

      <!-- Open Popover -->
      <div class="Popover">
        <ul class="Popover__list">
          <li class="Popover__item">
            <a href="/settings/profile" class="Popover__link">Account settings</a>
          </li>
          <li class="Popover__item">
            <a href="#" class="Popover__link">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </header>

  <main class="PageContent">
    <!-- Rest of the page goes here, empty for this mockup -->
  </main>

</body>
</html>
